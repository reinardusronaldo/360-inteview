<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Test - Vue JS</title>

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
    }

    .question {
      font-weight: 700;
      margin-bottom: 12px;
    }

    .radio-group {
      display: flex;
      gap: 16px;
      margin-bottom: 18px;
      align-items: center;
    }

    .field-area {
      position: relative;
      width: 100%;
      max-width: 520px;
      height: 230px;
      background: #ffffff;
      border: 1px solid #ccc;
      overflow: hidden;
      transition: background-color 0.35s ease;
    }

    .sport-box {
      position: absolute;
      width: 90px;
      height: 34px;
      border: 1px solid #d9d9d9;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      box-sizing: border-box;
      z-index: 1;
    }

    #footballBox {
      top: 14px;
      left: 14px;
    }

    #volleyballBox {
      top: 14px;
      right: 14px;
    }

    #badmintonBox {
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
    }

    .me-box {
      position: absolute;
      width: 90px;
      height: 34px;
      background: #333;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      transition:
        left 0.45s ease,
        top 0.45s ease,
        transform 0.45s ease;
      z-index: 2;
      box-sizing: border-box;
    }

    .selected-text {
      margin-top: 14px;
      font-weight: 700;
    }

    .equipments-title {
      margin-top: 10px;
      font-weight: 700;
    }

    ul {
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div id="app" class="container">
    <div class="question">What do you want to do for sport activity today?</div>

    <div class="radio-group">
      <label v-for="sport in sports" :key="sport.name" style="cursor: pointer;">
        <input type="radio" name="sport" :value="sport.name" v-model="selectedSportName" @change="updateUI" />
        {{ sport.name }}
      </label>
    </div>

    <div class="field-area" id="fieldArea" ref="fieldArea"
      :style="{ backgroundColor: selectedSport ? selectedSport.bg_color : '#ffffff' }">
      <div class="sport-box" id="footballBox" ref="footballBox">Football</div>
      <div class="sport-box" id="volleyballBox" ref="volleyballBox">Volleyball</div>
      <div class="sport-box" id="badmintonBox" ref="badmintonBox">Badminton</div>

      <div class="me-box" ref="meBox" :style="meStyle">
        Me
      </div>
    </div>

    <div class="selected-text">
      Select Sport:<span v-if="selectedSport"> {{ selectedSport.name }}</span>
    </div>

    <div class="equipments-title">Equipments:</div>
    <ul>
      <li v-for="item in equipments" :key="item">{{ item }}</li>
    </ul>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script>
    const { createApp, nextTick } = Vue;

    createApp({
      data() {
        return {
          sports: [
            {
              name: 'Football',
              bg_color: '#6bb46e',
              equipments: ['Ball', 'Football Shoes', 'Goalpost']
            },
            {
              name: 'Volleyball',
              bg_color: '#c30f42',
              equipments: ['Ball', 'Nets']
            },
            {
              name: 'Badminton',
              bg_color: '#2a82be',
              equipments: ['Shuttlecock', 'Nets', 'Racket']
            }
          ],
          selectedSportName: '',
          meStyle: {
            left: '50%',
            top: '50%',
            transform: 'translate(-50%, -50%)'
          }
        };
      },

      computed: {
        selectedSport() {
          return this.sports.find(sport => sport.name === this.selectedSportName) || null;
        },

        equipments() {
          return this.selectedSport ? this.selectedSport.equipments : [];
        }
      },

      methods: {
        async updateUI() {
          if (!this.selectedSport) return;

          await nextTick();
          this.moveMeBox(this.selectedSport.name);
        },

        moveMeBox(sportName) {
          const fieldArea = this.$refs.fieldArea;
          const targetBox = this.$refs[sportName.toLowerCase() + 'Box'];

          const fieldRect = fieldArea.getBoundingClientRect();
          const targetRect = targetBox.getBoundingClientRect();

          const left = targetRect.left - fieldRect.left;
          const top = targetRect.top - fieldRect.top;

          this.meStyle = {
            left: left + 'px',
            top: top + 'px',
            transform: 'translate(0, 0)'
          };
        }
      }
    }).mount('#app');
  </script>
</body>

</html>
